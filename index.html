<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Tax Calculator</title>

<style>

body{
font-family:Segoe UI;
background:#f3f6fb;
margin:0;
display:flex;
justify-content:center;
padding-top:40px;
}

.card{
background:white;
width:520px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.1);
overflow:hidden;
}

.header{
background:#1e4a94;
color:white;
padding:20px;
text-align:center;
font-weight:600;
}

.content{
padding:30px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

label{
font-size:12px;
margin-bottom:5px;
display:block;
}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #d0d6e0;
}

button{
width:100%;
margin-top:25px;
padding:14px;
border:none;
border-radius:14px;
background:#ffd200;
font-weight:700;
cursor:pointer;
}

.result{
margin-top:20px;
background:#eef2f8;
padding:18px;
border-radius:16px;
text-align:center;
font-weight:600;
}

.section{
margin-top:20px;
font-weight:600;
color:#1e4a94;
}

</style>
</head>

<body>

<div class="card">

<div class="header">
Registration Tax Calculator
</div>

<div class="content">

<div class="section">Vehicle Data</div>

<div class="grid">

<div>
<label>Environmental Class</label>
<select id="envClass">
<option value="euro14plus">Euro 14+ (after 2020)</option>
<option value="euro14">Euro 14</option>
<option value="euro12_14">Euro 12-14</option>
<option value="euro9_11">Euro 9-11</option>
<option value="euro8_or_worse">Euro 8 or worse</option>
</select>
</div>

<div>
<label>Power (kW)</label>
<input type="number" id="power">
</div>

</div>


<div class="section">New Vehicle</div>

<label><input type="radio" name="newCar" value="yes" onclick="toggleNewCar(true)"> Yes</label>
<label><input type="radio" name="newCar" value="no" checked onclick="toggleNewCar(false)"> No</label>


<div class="section">First Registration</div>

<div class="grid">

<div>
<label>Year</label>
<select id="regYear"></select>
</div>

<div>
<label>Month</label>
<select id="regMonth"></select>
</div>

</div>


<div class="section">Registration Procedure</div>

<div class="grid">

<div>
<label>Year</label>
<select id="calcYear"></select>
</div>

<div>
<label>Month</label>
<select id="calcMonth"></select>
</div>

</div>


<button onclick="calculateTax()">Calculate Registration Tax</button>

<div class="result" id="taxResult">
Enter data to calculate.
</div>

</div>

</div>


<script>

/* MONTHS */

const months=[
"January","February","March","April","May","June",
"July","August","September","October","November","December"
];

const regYear=document.getElementById("regYear");
const calcYear=document.getElementById("calcYear");
const regMonth=document.getElementById("regMonth");
const calcMonth=document.getElementById("calcMonth");

for(let y=2040;y>=2000;y--){

regYear.innerHTML+=`<option value="${y}">${y}</option>`;
calcYear.innerHTML+=`<option value="${y}">${y}</option>`;

}

months.forEach((m,i)=>{

regMonth.innerHTML+=`<option value="${i+1}">${m}</option>`;
calcMonth.innerHTML+=`<option value="${i+1}">${m}</option>`;

});


/* DISABLE DATE FOR NEW CAR */

function toggleNewCar(isNew){

regYear.disabled=isNew;
regMonth.disabled=isNew;
calcYear.disabled=isNew;
calcMonth.disabled=isNew;

}


/* BASE TAX TABLE */

const baseTaxTable={

euro14plus:[47000,70500,94000,141000,188000,282000,423000],
euro14:[70500,105750,141000,211500,282000,423000,634500],
euro12_14:[282000,423000,564000,846000,1128000,1692000,2538000],
euro9_11:[564000,846000,1128000,1692000,2256000,3384000,5076000],
euro8_or_worse:[1128000,1692000,2256000,3384000,4512000,6768000,10152000]

};


/* POWER RANGE */

function getPowerIndex(power){

if(power<=80) return 0;
if(power<=100) return 1;
if(power<=120) return 2;
if(power<=140) return 3;
if(power<=180) return 4;
if(power<=250) return 5;

return 6;

}


/* AGE MULTIPLIER (Munka1) */

function getAgeMultiplier(months){

if(months<=0) return 1;
if(months<=12) return 0.97;
if(months<=24) return 0.94;
if(months<=36) return 0.88;
if(months<=48) return 0.82;
if(months<=60) return 0.75;
if(months<=72) return 0.68;
if(months<=84) return 0.55;
if(months<=96) return 0.40;
if(months<=108) return 0.26;
if(months<=120) return 0.20;

return 0.20;

}


/* MAIN CALCULATION */

function calculateTax(){

let power=parseInt(document.getElementById("power").value);
let env=document.getElementById("envClass").value;

if(!power){

alert("Enter vehicle power");
return;

}

/* BASE TAX */

let index=getPowerIndex(power);
let baseTax=baseTaxTable[env][index];


/* NEW CAR */

let newCar=document.querySelector('input[name="newCar"]:checked').value==="yes";

let payable=baseTax;

if(!newCar){

let regY=parseInt(regYear.value);
let regM=parseInt(regMonth.value);

let calcY=parseInt(calcYear.value);
let calcM=parseInt(calcMonth.value);

/* MONTH DIFFERENCE */

let ageMonths=(calcY*12+calcM)-(regY*12+regM);

let multiplier=getAgeMultiplier(ageMonths);

payable=Math.round(baseTax*multiplier);

}

let reduction=baseTax-payable;

document.getElementById("taxResult").innerHTML=

`
Base Tax: ${baseTax.toLocaleString()} Ft<br>
Reduction: ${reduction.toLocaleString()} Ft<br>
Payable Tax: ${payable.toLocaleString()} Ft
`;

}

</script>

</body>
</html>
